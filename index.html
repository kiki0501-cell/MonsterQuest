<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monster Quest</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- 타이틀 -->
<div id="titleScreen" class="screen">

    <h1>MONSTER<br>QUEST</h1>

    <button onclick="newGame()">새 게임</button>
    <button>이어하기</button>
    <button>설정</button>

</div>

<!-- 이름 -->
<div id="nameScreen" class="screen hidden">

    <h2>플레이어 이름</h2>

    <input
        id="playerName"
        type="text"
        maxlength="10"
        placeholder="이름 입력">

    <button onclick="startAdventure()">
        모험 시작
    </button>

</div>

<!-- 게임 -->
<div id="gameScreen" class="screen hidden">

    <h2 id="townName">새벽마을</h2>

    <canvas
        id="gameCanvas"
        width="320"
        height="320">
    </canvas>

    <!-- 대화창 -->
    <div id="dialogBox" class="hidden">
        <p id="dialogText"></p>
        <button onclick="closeDialog()">닫기</button>
    </div>

    <!-- 모바일 방향패드 -->
    <div id="controls">

        <button class="move" onclick="movePlayer('up')">▲</button>

        <div class="middle">

            <button class="move" onclick="movePlayer('left')">◀</button>

            <button class="move center">
                ●
            </button>

            <button class="move" onclick="movePlayer('right')">▶</button>

        </div>

        <button class="move" onclick="movePlayer('down')">▼</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
